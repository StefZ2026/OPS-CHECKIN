kind = "web"
previewPath = "/"
title = "ICU Check-In"
version = "1.0.0"
id = "artifacts/checkin-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23997
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/checkin-app run dev"

[services.env]
PORT = "23997"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/checkin-app", "run", "build"]
publicDir = "artifacts/checkin-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
